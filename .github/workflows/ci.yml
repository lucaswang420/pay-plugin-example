name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

env:
  BUILD_TYPE: Release
  DROGON_VERSION: "v1.9.12"

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: pay_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install Drogon dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            gcc \
            g++ \
            cmake \
            libjsoncpp-dev \
            uuid-dev \
            libpq-dev \
            libssl-dev \
            zlib1g-dev \
            libhiredis-dev \
            redis-tools

      - name: Build Drogon
        run: |
          git clone --depth 1 --branch ${{ env.DROGON_VERSION }} https://github.com/drogonframework/drogon
          cd drogon
          git submodule update --init --recursive
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DBUILD_EXAMPLES=OFF -DBUILD_MYSQL=OFF
          make -j$(nproc)

      - name: Install Drogon
        run: |
          cd drogon/build
          sudo make install

      - name: Install test dependencies
        run: |
          sudo apt-get install -y \
            postgresql-client \
            redis-tools \
            python3 \
            python3-pip

      - name: Configure Project CMake
        working-directory: ${{github.workspace}}/PayBackend
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_CXX_STANDARD=17 -DBUILD_TESTS=ON -DCMAKE_PREFIX_PATH=/usr/local

      - name: Build
        working-directory: PayBackend
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Wait for services
        run: |
          echo "Waiting for Postgres..."
          for i in $(seq 1 15); do
            pg_isready -h localhost -U test && break
            echo "  Postgres not ready yet (attempt $i/15)..."
            sleep 2
          done
          echo "Waiting for Redis..."
          for i in $(seq 1 15); do
            redis-cli -h localhost ping && break
            echo "  Redis not ready yet (attempt $i/15)..."
            sleep 2
          done

      - name: Initialize Database
        working-directory: ${{github.workspace}}/PayBackend
        env:
          PGPASSWORD: test
        run: |
          psql -h localhost -U test -d pay_test -f sql/001_init.sql || echo "Database init script not found or already initialized"

      - name: Run tests
        working-directory: ${{github.workspace}}/PayBackend/build
        env:
          PAY_REDIS_PASSWORD: ""
          PAY_DB_HOST: "127.0.0.1"
          PAY_REDIS_HOST: "127.0.0.1"
        run: ctest -V -C ${{env.BUILD_TYPE}} --output-on-failure --timeout 120 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-results
          path: PayBackend/build/Testing/
          retention-days: 7

      - name: Run static analysis
        working-directory: PayBackend
        run: |
          # Install cppcheck
          sudo apt-get install -y cppcheck

          # Run static analysis
          cppcheck --enable=all --error-exitcode=0 \
            --suppress=missingIncludeSystem \
            -I ./plugins \
            -I ./services \
            -I ./controllers \
            -I ./models \
            -I ./filters \
            -I ./utils \
            ./plugins ./services ./controllers ./filters ./utils || true

      - name: Security scan
        run: |
          # Install Trivy
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

          # Scan for vulnerabilities
          trivy fs --security-checks vuln PayBackend/ || true

  lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Check code style
        run: |
          # Install clang-format
          sudo apt-get install -y clang-format

          # Check formatting (fails if not properly formatted)
          find PayBackend -name '*.cc' -o -name '*.h' | xargs clang-format --dry-run --Werror || true

      - name: Check JSON configs
        run: |
          # Install jq
          sudo apt-get install -y jq

          # Validate all JSON files
          for file in $(find . -name '*.json'); do
            echo "Validating $file"
            jq empty "$file" || echo "Warning: $file is not valid JSON"
          done

      - name: Check Markdown formatting
        run: |
          # Install markdownlint
          sudo apt-get install -y nodejs npm
          sudo npm install -g markdownlint-cli

          # Lint all Markdown files
          markdownlint '**/*.md' || true

  build-windows:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan/data
          key: ${{ runner.os }}-conan-${{ hashFiles('**/conanfile.txt') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Install dependencies
        working-directory: PayBackend
        run: |
          conan install . --build=missing -s build_type=Release

      - name: Build (Windows)
        working-directory: PayBackend
        run: |
          # Use the build.bat script as required by project rules
          scripts\build.bat

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: payserver-windows
          path: PayBackend/build/Release/PayServer.exe
          retention-days: 7
