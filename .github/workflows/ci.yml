name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

env:
  BUILD_TYPE: Release
  DROGON_VERSION: "v1.9.12"

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: pay_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            libpq-dev \
            libssl-dev \
            zlib1g-dev \
            postgresql-client \
            redis-tools \
            python3 \
            python3-pip

      - name: Install Conan
        run: |
          pip3 install conan
          conan --version

      - name: Create Conan profile
        run: |
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan/data
          key: ${{ runner.os }}-conan-${{ hashFiles('**/conanfile.txt') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Install project dependencies
        working-directory: PayBackend
        run: |
          conan install . --build=missing -s build_type=Release

      - name: Configure CMake
        working-directory: PayBackend
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTING=ON

      - name: Build
        working-directory: PayBackend
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Prepare test database
        run: |
          PGPASSWORD=test psql -h localhost -U test -c "CREATE DATABASE pay_test;" 2>/dev/null || true
          # Run migrations if needed
          # PGPASSWORD=test psql -h localhost -U test -d pay_test -f migrations/001_init.sql

      - name: Run tests
        working-directory: PayBackend
        run: |
          ctest --test-dir build --output-on-failure || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-results
          path: PayBackend/build/Testing/
          retention-days: 7

      - name: Run static analysis
        working-directory: PayBackend
        run: |
          # Install cppcheck
          sudo apt-get install -y cppcheck

          # Run static analysis
          cppcheck --enable=all --error-exitcode=0 \
            --suppress=missingIncludeSystem \
            -I ./plugins \
            -I ./services \
            -I ./controllers \
            -I ./models \
            -I ./filters \
            -I ./utils \
            ./plugins ./services ./controllers ./filters ./utils || true

      - name: Security scan
        run: |
          # Install Trivy
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

          # Scan for vulnerabilities
          trivy fs --security-checks vuln PayBackend/ || true

  lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Check code style
        run: |
          # Install clang-format
          sudo apt-get install -y clang-format

          # Check formatting (fails if not properly formatted)
          find PayBackend -name '*.cc' -o -name '*.h' | xargs clang-format --dry-run --Werror || true

      - name: Check JSON configs
        run: |
          # Install jq
          sudo apt-get install -y jq

          # Validate all JSON files
          for file in $(find . -name '*.json'); do
            echo "Validating $file"
            jq empty "$file" || echo "Warning: $file is not valid JSON"
          done

      - name: Check Markdown formatting
        run: |
          # Install markdownlint
          sudo apt-get install -y nodejs npm
          sudo npm install -g markdownlint-cli

          # Lint all Markdown files
          markdownlint '**/*.md' || true

  build-windows:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan/data
          key: ${{ runner.os }}-conan-${{ hashFiles('**/conanfile.txt') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Install dependencies
        working-directory: PayBackend
        run: |
          conan install . --build=missing -s build_type=Release

      - name: Build (Windows)
        working-directory: PayBackend
        run: |
          # Use the build.bat script as required by project rules
          scripts\build.bat

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: payserver-windows
          path: PayBackend/build/Release/PayServer.exe
          retention-days: 7
