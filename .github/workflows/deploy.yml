name: Deploy

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: payserver

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/payserver
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./PayBackend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo ${{ steps.meta.outputs.digest }}

  deploy-staging:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: build-and-push
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging-api.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to staging
        run: |
          # Update ECS service with new image
          aws ecs update-service \
            --cluster payserver-staging \
            --service payserver \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment
        run: |
          # Wait for service to stabilize
          aws ecs wait services-stable \
            --cluster payserver-staging \
            --services payserver \
            --region ${{ env.AWS_REGION }}

      - name: Health check
        run: |
          # Check if service is healthy
          curl -f https://staging-api.example.com/health || exit 1

  deploy-production:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://api.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create deployment backup
        run: |
          # Create database backup before deployment
          aws rds create-db-snapshot \
            --db-instance-identifier payserver-production \
            --db-snapshot-identifier pre-deployment-$(date +%Y%m%d-%H%M%S) \
            --region ${{ env.AWS_REGION }}

      - name: Deploy to production
        run: |
          # Update ECS service with new image
          aws ecs update-service \
            --cluster payserver-production \
            --service payserver \
            --deployment-configuration "maximumPercent=200,minimumHealthyPercent=100,deploymentCircuitBreaker={enable=true,rollback=true}" \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment
        run: |
          # Wait for service to stabilize (max 30 minutes)
          aws ecs wait services-stable \
            --cluster payserver-production \
            --services payserver \
            --region ${{ env.AWS_REGION }}

      - name: Health check
        run: |
          # Perform health checks
          for i in {1..30}; do
            if curl -f https://api.example.com/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check failed, retrying... ($i/30)"
            sleep 10
          done
          echo "Health check failed after 30 attempts"
          exit 1

      - name: Run smoke tests
        run: |
          # Execute smoke tests against production
          curl -f -H "X-Api-Key: ${{ secrets.TEST_API_KEY }}" \
            https://api.example.com/pay/query?order_no=test_smoke

      - name: Notify deployment success
        if: success()
        run: |
          # Send notification (Slack, email, etc.)
          echo "Deployment to production successful!"

      - name: Rollback on failure
        if: failure()
        run: |
          # Rollback ECS service
          aws ecs update-service \
            --cluster payserver-production \
            --service payserver \
            --task-definition $(aws ecs describe-services \
              --cluster payserver-production \
              --services payserver \
              --query 'services[0].taskDefinition' \
              --output text \
              --region ${{ env.AWS_REGION }}) \
            --region ${{ env.AWS_REGION }}
          echo "Rollback initiated due to deployment failure"

  notify:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Send notification
        run: |
          # Send deployment status notification
          echo "Deployment completed with status: ${{ needs.deploy-production.result }}"
